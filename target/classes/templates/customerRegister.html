<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Customer Registration | Smart Queue</title>

<style>

/* ---------- GLOBAL ---------- */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background-color:#eef2f7;
}

/* Top strip */
.top-strip{
    background:linear-gradient(to right, #ff9933, white, #138808);
    height:6px;
}

/* Header - Blue Gradient */
header{
    background: linear-gradient(to right, #4facfe, #1f3c88);
    color:white;
    padding:18px 40px;
    display:flex;
    align-items:center;
    gap:15px;
}

header img{
    width:55px;
}

.site-title{
    font-size:24px;
    font-weight:bold;
}

.subtitle{
    font-size:14px;
    opacity:0.9;
}

/* Navigation - Dark Blue */
nav{
    background:#162d66;
    padding:12px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#4facfe;
}

/* ---------- FORM SECTION ---------- */

.form-section{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
}

.form-card{
    background:white;
    width:420px;
    padding:40px;
    border-radius:16px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
    border-top:6px solid #1f3c88;
}

.form-card h2{
    text-align:center;
    color:#1f3c88;
    margin-bottom:25px;
}

/* Form Group */
.form-group{
    margin-bottom:18px;
}

.form-group label{
    font-weight:500;
    display:block;
    margin-bottom:6px;
    color:#333;
}

.form-group input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#1f3c88;
    box-shadow:0 0 0 2px rgba(31,60,136,0.1);
}

/* Button - Theme */
.btn{
    width:100%;
    padding:11px;
    background:#1f3c88;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#162d66;
}

/* Messages */
.error{
    color:#d32f2f;
    text-align:center;
    margin-bottom:10px;
}

.success{
    color:#2e7d32;
    text-align:center;
    margin-bottom:10px;
}

/* Login Link */
.login-link a{
    color:#1f3c88;
    font-weight:bold;
    text-decoration:none;
}

.login-link a:hover{
    text-decoration:underline;
}

/* Footer */
footer{
    background:#162d66;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:60px;
    font-size:14px;
}

/* ---------- RESPONSIVE ---------- */

@media(max-width:480px){

    header{
        flex-direction:column;
        text-align:center;
    }

    .form-card{
        width:100%;
        padding:30px 20px;
    }

    nav a{
        display:block;
        margin:10px 0;
    }
}

</style>
</head>

<body>

<div class="top-strip"></div>

<header>
    <!-- LOGO NOT REMOVED -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg">
    <div>
        <div class="site-title">Smart Queue Management System</div>
        <div class="subtitle">Digital Governance Service Portal</div>
    </div>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/customer/register">Customer Register</a>
    <a href="/customer/login">Customer Login</a>
    <a href="/admin/login">Officer Login</a>
</nav>

<section class="form-section">

    <div class="form-card">

        <h2>Customer Registration</h2>

        <p class="error" th:text="${error}"></p>
        <p class="success" th:text="${success}"></p>

        <form th:action="@{/customer/register}" method="post" th:object="${customer}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required>
            </div>

            <div class="form-group">
                <label>Mobile</label>
                <input type="text" th:field="*{mobile}" required>
            </div>

            <button type="submit" class="btn">Register</button>

        </form>

        <p class="login-link" style="text-align:center; margin-top:15px;">
            Already have an account?
            <a href="/customer/login">Login</a>
        </p>

    </div>

</section>

<footer>
    © 2026 Government of India | Smart Queue Management System  
    <br>
    Ministry of Digital Public Services
</footer>

</body>
</html>
