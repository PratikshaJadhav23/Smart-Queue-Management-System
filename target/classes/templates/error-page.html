<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Error - Smart Queue</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background-color:#eef2f7;
}

/* Top tricolor strip */
.top-strip{
    background: linear-gradient(to right, #ff9933, white, #138808);
    height:6px;
}

/* Header - Updated Gradient */
header{
    background: linear-gradient(to right, #4facfe, #1f3c88);
    padding:15px 40px;
    display:flex;
    align-items:center;
    gap:15px;
    color:white;
}

header img{
    width:60px;
}

.site-title{
    font-size:22px;
    font-weight:bold;
}

.subtitle{
    font-size:14px;
    opacity:0.9;
}

/* Section */
.section{
    padding:80px 20px;
    text-align:center;
}

/* Error Card */
.error-card{
    background:white;
    max-width:500px;
    margin:auto;
    padding:40px;
    border-radius:16px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* Error Heading */
.error-card h2{
    color:#d32f2f;
    font-size:28px;
    margin-bottom:20px;
}

/* Error Message */
.error-card p{
    font-size:16px;
    margin-bottom:30px;
    color:#333;
}

/* Button - Theme Blue */
.btn{
    display:inline-block;
    padding:10px 20px;
    background:#1f3c88;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:500;
    transition:0.3s;
}

.btn:hover{
    background:#162d66;
}

/* Footer - Dark Blue */
footer{
    background:#162d66;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:100px;
    font-size:14px;
}

/* Responsive */
@media(max-width:768px){
    header{
        padding:15px 20px;
    }

    .section{
        padding:50px 20px;
    }

    .error-card{
        padding:30px 20px;
    }
}

</style>
</head>

<body>

<div class="top-strip"></div>

<header>
    <!-- LOGO NOT REMOVED -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg">
    <div>
        <div class="site-title">Smart Queue Management System</div>
        <div class="subtitle">Government Digital Service Portal</div>
    </div>
</header>

<section class="section">

    <div class="error-card">

        <h2>Error</h2>

        <p th:text="${message}"></p>

        <a href="/" class="btn">Go Back to Home</a>

    </div>

</section>

<footer>
    © 2026 Government of India | Smart Queue Management System
</footer>

</body>
</html>
