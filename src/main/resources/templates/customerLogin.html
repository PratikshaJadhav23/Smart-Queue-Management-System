<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Customer Login | Smart Queue</title>

<style>

/* ---------- GLOBAL ---------- */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background-color:#fdf6ec;
}

/* Top strip */
.top-strip{
    background:linear-gradient(to right, #ff9933, white, #138808);
    height:6px;
}

/* Header */
header{
    background:#a52a2a;
    color:white;
    padding:18px 40px;
    display:flex;
    align-items:center;
    gap:15px;
}

header img{
    width:55px;
}

.site-title{
    font-size:24px;
    font-weight:bold;
}

.subtitle{
    font-size:14px;
    opacity:0.9;
}

/* Navigation */
nav{
    background:#7b1e1e;
    padding:12px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:500;
}

nav a:hover{
    color:#ffd700;
}

/* ---------- FORM SECTION ---------- */

.form-section{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:70px 20px;
}

.form-card{
    background:white;
    width:380px;
    padding:35px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    border-top:6px solid #c75b12;
}

.form-card h2{
    text-align:center;
    color:#7b1e1e;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    font-weight:500;
    display:block;
    margin-bottom:6px;
}

.form-group input{
    width:100%;
    padding:10px;
    border-radius:4px;
    border:1px solid #ccc;
    font-size:14px;
}

.form-group input:focus{
    outline:none;
    border-color:#c75b12;
}

/* Button */
.btn{
    width:100%;
    padding:10px;
    background:#7b1e1e;
    color:white;
    border:none;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    background:#5a1414;
}

/* Error message */
.error{
    color:red;
    text-align:center;
    margin-bottom:15px;
}

/* Footer */
footer{
    background:#7b1e1e;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:40px;
}

/* ---------- RESPONSIVE ---------- */

@media(max-width:480px){

    header{
        flex-direction:column;
        text-align:center;
    }

    .form-card{
        width:100%;
    }

    nav a{
        display:block;
        margin:10px 0;
    }
}

</style>
</head>

<body>

<div class="top-strip"></div>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg">
    <div>
        <div class="site-title">Smart Queue Management System</div>
        <div class="subtitle">Digital Governance Service Portal</div>
    </div>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/customer/register">Customer Register</a>
    <a href="/customer/login">Customer Login</a>
    <a href="/admin/login">Officer Login</a>
</nav>

<section class="form-section">

    <div class="form-card">

        <h2>Customer Login</h2>

        <p class="error" th:text="${error}"></p>

        <form th:action="@{/customer/login}" method="post">

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn">Login</button>

        </form>

        <p style="text-align:center; margin-top:15px;">
            New User?
            <a href="/customer/register" style="color:#7b1e1e; font-weight:bold;">
                Register Here
            </a>
        </p>

    </div>

</section>

<footer>
    © 2026 Government of India | Smart Queue Management System  
    <br>
    Ministry of Digital Public Services
</footer>

</body>
</html>
