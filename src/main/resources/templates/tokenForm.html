<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Generate Token - Smart Queue</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background-color:#eef2f7;
}

/* Top tricolor strip */
.top-strip{
    background: linear-gradient(to right, #ff9933, white, #138808);
    height:6px;
}

/* Header - Blue Gradient */
header{
    background: linear-gradient(to right, #4facfe, #1f3c88);
    padding:18px 40px;
    display:flex;
    align-items:center;
    gap:15px;
    color:white;
}

header img{
    width:60px;
}

.site-title{
    font-size:22px;
    font-weight:bold;
}

.subtitle{
    font-size:14px;
    opacity:0.9;
}

/* Section */
.section{
    padding:80px 20px;
    display:flex;
    justify-content:center;
}

/* Form Card */
.form-card{
    background:white;
    width:100%;
    max-width:520px;
    padding:40px;
    border-radius:16px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
    border-top:6px solid #1f3c88;
}

.form-card h2{
    text-align:center;
    color:#1f3c88;
    margin-bottom:25px;
}

/* Form Elements */
label{
    display:block;
    margin-top:18px;
    font-weight:500;
    color:#333;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    transition:0.3s;
}

input:focus, select:focus{
    outline:none;
    border-color:#1f3c88;
    box-shadow:0 0 0 2px rgba(31,60,136,0.1);
}

/* Button - Theme */
button{
    width:100%;
    margin-top:30px;
    padding:12px;
    background:#1f3c88;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#162d66;
}

/* Error Message */
.error{
    color:#d32f2f;
    margin-top:15px;
    text-align:center;
    font-weight:500;
}

/* Footer */
footer{
    background:#162d66;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:80px;
    font-size:14px;
}

/* Responsive */
@media(max-width:768px){

    header{
        padding:15px 20px;
    }

    .section{
        padding:50px 20px;
    }

    .form-card{
        padding:30px 20px;
    }
}

</style>
</head>

<body>

<div class="top-strip"></div>

<header>
    <!-- LOGO NOT REMOVED -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg">
    <div>
        <div class="site-title">Smart Queue Management System</div>
        <div class="subtitle">Citizen Token Generation Portal</div>
    </div>
</header>

<section class="section">

    <div class="form-card">

        <h2>Generate Token</h2>

        <form method="post" th:action="@{/generate}">

            <label>Name:</label>
            <input type="text" name="citizenName" required>

            <label>Mobile:</label>
            <input type="text" name="mobile" required>

            <label>Select Service:</label>
            <select name="serviceId" required>
                <option value="">--Select--</option>
                <option th:each="service : ${services}"
                        th:value="${service.id}"
                        th:text="${service.serviceName}">
                </option>
            </select>

            <label>Priority:</label>
            <select name="priorityType">
                <option value="NORMAL">Normal</option>
                <option value="SENIOR">Senior Citizen</option>
                <option value="DISABLED">Disabled</option>
            </select>

            <button type="submit">Generate Token</button>
        </form>

        <p class="error" th:text="${error}"></p>

    </div>

</section>

<footer>
    © 2026 Government of India | Smart Queue Management System
</footer>

</body>
</html>
